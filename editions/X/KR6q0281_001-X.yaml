body:
  text: 門人慧弼編師既受請秀峯和尚引座竟師乃登座僧問和尚未見草堂時如何師云江南有僧問見草堂後如何師云江北無謝詞不錄師乃云俊快底點著便行癡鈍底推挽不動便行則人人懽喜不動則箇箇生嫌山僧而今轉此癡鈍為俊快去也彈指一下從前推挽不出而今出從前有院不肯住而今住從前嫌佛不做而今做從前嫌法不說而今說出不出住不住即且置敢問諸人做底是甚麼佛空王佛耶然燈佛耶釋迦佛耶彌勒佛耶說底又是甚麼法根本法耶無生法耶世間法耶出世間法耶眾中莫有道得底麼若道得山僧出世事畢如或未然逢人不得錯舉喝一喝下座秀峯辭眾上堂雲凝石室本無舒卷之心豆𪹼寒灰遂有去留之異尋常交肩粥飯處眼見鼻孔夜半轉身通氣時箭過新羅南北兩山風流二老兄呼弟應響順聲和又說甚麼箭過新羅箇中端的意能有幾人知入院指方丈云從上佛祖到這裏只得乞命天下衲僧到這裏不敢喘氣且道這裏是甚麼所在喝一喝雪峯方丈也不識陞座拈香祝聖罷僧問遠離秀嶺之禪剎來登雪峯之道場如何是不動尊師云夜行步步踏明月僧云與麼則半千年覩異人出百萬天飛花雨來師云千年萬歲雪峯山僧云作家宗師天然猶在師云三十年後未有棒到你良久云大眾會麼孤峯象骨土主松山溟鵬九萬遼鶴三千留香舊客垂老再來真覺輥毬玄沙斫牌南泉賣身趙州還債南山鱉鼻虵頭匾似扇擬則傷人其毒無藥新長老口似乞兒蓆袋和底一時翻出更不囊藏覆盖以此壽聖人則天長地久以此祝賢帥則伊尹周公以此安樂生民則時清歲稔以此播揚大教則盖天盖地乃呵呵大笑云空上座纔入門來早是口裏水漉漉地後五日堪作甚麼喝一喝下座當晚小參僧問記得和尚早晨示眾云從前推挽不出而今為甚麼却出師云閏年春色晚僧云從前有院不住而今為甚麼却住師云六月黃河連底凍僧云從前嫌佛不做而今為甚麼却做師云披毛戴角有甚麼難僧云從前嫌法不說而今為甚麼却說師云嚴冬銕樹自開花僧云將謂春歸無覔處誰知轉向此間來師云訝郎當漢又與麼去師乃召大眾云許多日中為諸人抑逼得來直是覔箇死處不可得記得釋迦老子三七日中思惟曰我寧不說法疾入於涅槃似這老子不唧𠺕尚乃如是又爭恠得空上座當其雪峯命下之日若有箇牙如劒樹口似血盆底衲僧把一條白棒向丁山頂𩕳上立却待雪峯專使一行人到來一喝喝住你待向甚處去八州管內不是無長老你隔山隔嶺過來覔箇甚麼奪將疏帖盡情拋向萬仞崖下亂棒一時打回去却歸披秀堂中山僧大展坐具禮伊九拜尊之為師而今既無如是手段山僧不免披毛戴角是非海裏橫身入豺虎羣中自在行去也喝一喝下座上堂僧問擊將頹之法皷振已墜之玄綱法皷既鳴玄綱已振未審皷聲中還有奇特事也無師云有僧云如何是奇特事師云楊岐見慈明僧云學人未曉乞師再指師云雲菴參積翠僧云只如禾山四打皷一眾皆悟未審與和尚鳴皷是同是別師云你還悟也未僧云學人悟也師云謔你屋裏老爺師乃云好大眾得與麼省要得與麼成現所以古人云汝千百人中若有一人大肯去山僧作驢駞物供養他有甚麼罪過古人不妨好心要且揀僧布施擇佛燒香我觀此會千百人無一人不是大肯去底所以自秀峯受了府命即時披這毛衣駞所供養徑入山來入山則不無且道所駞底是甚麼物又作麼生供養還有見得底麼良久云晨朝有粥齋時飯日日香花夜夜燈謝新兩序上堂山僧纔到雪嶺打就無底銕船使入真覺海中運載情與無情教伊不住此岸不滯彼岸不居中流一箇箇出來似箇衲僧去文殊把篙立其頭普賢把正其尾千手眼菩薩兩旁搖櫓不退轉菩薩看風使帆山僧只知洗脚上船日中一飯夜中一宿煙消日出天地寬欵乃一聲山水綠好大哥到東禪陞座問話畢師云山龜有殻自謂畢生安樂於泥塗眾手攻之盖是豐干饒舌於其始致使藏頭露尾藏尾露頭左回右避皆莫能得一朝忽地憋僺和殻一時趯脫淨倮倮地把箇窮性命子盡情拋在眾人前又却無一星事乃呵呵大笑云莫道無事好自出山便安排一段禪要來東寺對大禪師與諸耆舊東道西說數日參州人事袞袞今日到來捫摸胸中一字也記不得更說甚三關五關只這一關也不消得他日望州亭烏石嶺驀劄相逢莫道而今放過李侍郎以小雲菴請師不出東禪有頌寄師云山龜有殼藏頭尾七十二鑽爭奈何云云上堂舉真覺一日問備頭陀何不遍參去備云達磨不來東土二祖不往西天真覺肯之師舉了呵呵大笑云後來叢林中盡謂此語奇特殊不知這老漢至今塔下坐堆堆地只為當時恁麼如今若有人道達磨不來東土二祖不往西天直是喫棒趂出何故當時肯之而今却打趂出院具眼者辨取結夏小參百川異流同歸於海萬區分義總成乎實所以十方雲水共夏雪山其間有已證未證有義學玄學莫不皆是以大圓覺為我伽藍身心安居無雜無壤乃喝一喝云且道這一喝是作一喝用是不作一喝用是探竿影草是金剛王寶劒是踞地師子未具透關眼者莫道不疑好敘辭畢乃云古者道未徹底人參句不如參意既徹底人得意不如得句古人與麼曲為今時不風流處亦自風流汝輩後生家入眾參禪切在子細不得掠虗第一須得悟既悟須要行既行須要徹既徹方且似箇衲僧不為分外山僧百醜千拙口吻稚鈍別無新鮮語句攢花簇錦四六八六與諸兄弟咂啖只是一口靈鋒寶劒但有來者不消一刜且作麼生入得雪峯門喝一喝下座結夏上堂少室九年守株待兔神光三拜緣木求魚馬祖即心是佛劈頭便錯盤山非心非佛末後猶乖臨濟入門便喝可煞著忙德山入門便棒未遇作家趙州關子強生節目溈山水牯慙惶殺人雲門顧鑒也是尋常雪峯輥毬至今未了皆是從上不得勦絕致使後來為之帶累而今雪峯門下莫有逈超今古絕類離倫底麼向結夏十五日道將一句來直饒道得也是河裏失錢河裏摝喝一喝下座安撫龍學侍郎齋僧請上堂僧問昔日李相國訪藥山問如何是道山云雲在青天水在缾此理如何師云薰風自南來僧云猶來一句無多子作略還他老乍家師云草木生光輝僧云只如相國道鍊得身形似鶴形千株松下兩函經我來問道無餘說雲在青天水在缾又作麼生師云一字入公門九牛拽不出僧云直得千載英風動寰宇至今流落在叢林師云側身穿市過仰面看天行僧云可謂好風來不盡真照用無窮師云真箇乃云羣靈一源名之曰佛輝騰今古逈絕見知圓滿十虗寧有方所迷之則迷作眾生悟之則悟成諸佛生佛似有差殊此箇本無增減在天而天處人而人在比丘則比丘中尊在居士則居士中尊在婦女則婦女中尊在宰官則宰官中尊隨其所在悉皆尊上乃舉起拂子云而今在山僧拂子頭上又喚作甚麼這裏荷負得去衲僧面前切忌拈出且道衲僧家別有甚麼長處記得楊億侍郎問廣惠云承和尚有言一切罪業皆因財寶所生勸人疎於財寶而況南閻浮提眾生以財為命國以財聚人教中有財法二施何得勸人疎於財寶惠曰幡竿尖上銕龍頭侍郎云海𠿞馬子似驢大惠曰楚雞不是丹山鳳侍郎云佛滅二千年比丘少慙愧大眾你禪和家尋常問著口似紡車還知此二人落處麼今日不惜眉毛因齋慶讚向你諸人道雪峯是張侍郎請三十年後不得錯舉施主散經請上堂是法不可示言辭相寂滅釋迦老子向這裏轉得一步便向靈山會上四十九年演出一大藏教彌滿龍宮海藏流布天上人間達磨大師向這裏著得一隻眼便解從南天竺國十萬里得得而來少林面壁九年單傳心印不立文字天下老和尚向這裏出得一頭地便解向曲木繩床上播揚大教流出胸襟盖天盖地三段不同今當第一乃竪起拄杖云一時穿却卓一下云甚處去也敘辭畢乃云生死若是有從古至今無人能免生死若是無從古至今無人能免生死若是亦有亦無非有非無悉皆無有免者既然如是又且如何免得只有箇悟之一字除此無門除此無路你諸人而今忽若立地悟去莫道生死以至十方虗空悉皆消殞只恐你根思遲回未能瞥脫山僧與你說箇喻子喻如人睡著身在床上安穩自在無端忽於夢中見有毒蛇猛虎競來吞噉中心怕怖慞惶馳走正當馳走之處忽然眼開生死之法亦復如是忽有箇衲僧出來道大小雪峯長老受施主如此供養却向法座上只說得一箇夢乃呵呵大笑云元來癡人面前不得說夢東禪和尚到上堂大眾善知識者如天甘露或但聞名而不得飲善知識者如旱時雨或但渴望不蒙其澤善知識者如金剛王寶劒若有見者偷心永斷善知識者如當門師子若有見者疑心永息今者山門多幸伏承東禪堂上和尚大禪師象駕見臨山僧與此一眾如飯飲甘露渴得甘雨而況禪師某之故人三十年江湖上叢林戶知不在更說只有一事須當對眾說破此者置千五百斤銕枷於山僧項上乃是此老下毒手夜來方丈內種種撫存種種誨諭又似大斧斫了手摩挲而今只得歡喜忍受下座即與知事大眾同伸拜請登于此座使現前一眾知臨濟金剛王汾陽當門師子列聖鈴鎚佛祖命脉到今不斷祖忌上堂老子參禪太辛苦九上洞山三投子德山棒下桶底脫鰲山店頭用不著自從成道至于今鼈鼻傷人毒無藥毒無藥賴是當時欠一著且道欠那一著今日開山真覺和尚忌晨山門截日計口之後凡事不如昔山僧不免將無作有且要不墜家聲以百億四天下為一壇場以百億須彌山為一盤酸餡以百億四天下為一柸䬪飥以百億日月為一筵燈燭雖然供養微薄且是不從外求遽起身作女人拜云曾郎萬福莫怪空疎上堂雪峯五月五日不假神符妙術只有頂門一錐乃卓主丈云銕佛也須汗出施主請普說師云說則不普普則不說若有所說終非普說氷窟開花炎天落雪明眼高流須善時節且道而今是甚麼時節莫是黃昬戌麼莫是灯燭交輝人天普集麼若與麼違時失候不少今夜三信女請普說為其大夫人壽記得閩王問壽山禪師云壽山年多少山云與虗空同壽王云虗空年多少山云與壽山同壽師云壽山不妨奇特要且年高倒耄奴郎不辨玉石不分只知與虗空同壽殊不知虗空更是兒孫靈溪請上堂三世諸佛向這裏出頭不得一大藏教著一字不得天下老師口向這裏百雜碎此真覺和尚三百年前說底法直至于今不移毫髮雖然如是真覺只解把住不解放行山僧今日因靈溪開經設齋放一線道從教一切處光明燦爛去乃竪起主丈云三世諸佛向這裏坐寶蓮華成等正覺說法度人一大藏教向這裏字義炳然言言見諦不勞翻譯天下老師口向這裏多說少說縱橫十字說了無剩法乃呵呵大笑云嘉州大像聞與麼說話忽變作嬌尸迦把將南閻浮提東弗于逮西瞿耶尼北單越束作一枝筆向太虗空中大書七字云毗盧法寶大經卷世間有眼者看不見有口者誦不出獨有雪峯山中一千五百衲子一箇箇見得誦得若信不及山僧更與你重說偈言上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也卓主丈下座靈溪請普說師云山僧許多日中鳴皷上堂小參普說你看山僧口中舌在麼乃大開口云在麼若道在也皷弄人家男女未有了日若道爛也皷弄人家男女未有了日山僧而今別也你諸人今夜須別作箇眼目始得雖然如是多處添些子少處減些子總不見得記得汾陽和尚有四轉語如何是接初機句你是行脚僧如何是驗衲僧句西方日出卯如何是正令行句千里持來呈舊面如何是立乾坤句北俱盧洲長粳米食者無貪亦無嗔汾陽自謂將此四轉語驗天下衲僧大愚芝云將此四轉語被天下衲僧勘破大眾有是父必有是子山僧今夜亦有四轉語如何是接初機句金剛杵打銕山摧如何是驗衲僧句岳陽船子洞庭波如何是正令行句夜叉屈膝眼睛黑如何是立乾坤句經來白馬寺僧至赤烏年山僧這四轉語一轉語賓中有主一轉語主中有賓一轉語賓中常賓一轉語主中常主而今眾中莫有分得出底麼靈溪今夜末後殷懃此四轉語若分未得且留與靈溪送路逗到明朝後日船到瓜山岸下院中兄弟山前檀越竟來問訊未審大師作麼生舉還舉得麼良久云但道我親到雪峯來聖節上堂大眾還相委悉麼此是普光明殿蓮華師子之座人天普集凡聖交參所說之法臣僧今日幸遇天申聖節不敢秘藏盡情舉唱直得如天普覆似地普擎窮古今亘萬世而不移消劫石空芥城而無盡以此仰祝皇帝壽山堅固如不動妙高之山福海汪洋等甚深功德之海溢目風光彌法界祥雲瑞氣樂昇平小參二百年前風穴和尚於選佛場中曾立箇䇿問至今未有人答得我此一眾盡是選佛底俊流一操直取狀元山僧今夜不免向糞掃堆頭斬新拈出與汝諸人答看參學眼目臨機直須大用現前勿自拘於小節設使言前薦得猶是滯殻迷封縱然句下精通未免觸途狂見汝等諸人應是從前學解明昧兩岐如今為汝一時掃却直須箇箇如師子兒吒沙地哮吼一聲壁立千仞誰敢正眼著著即瞎却渠眼此是風穴和尚與麼道而今莫有吒沙地底師子兒麼試出來哮吼一聲不見道驚羣之句須向驚羣處舉揚奇特之事須向奇特人拈出平生慶快只在如今過後思賢不為英俊有麼有麼如無山僧老大衰颯不免作少年調度與你諸人代筆去也驀拈主丈劃一劃乃橫按喝一喝云風穴老漢合喫三十痛棒𣤩瞎貶向二銕圍山自餘釋迦元和佛陀是甚麼碗躂丘擲主丈下座上堂千五百眾雪山住無麵軟餅裹露柱橫咬竪咬飽便休莫倚他門傍他戶以拂子擊繩床下座上堂月生一上下四維無等匹月生二須彌拽脫虗空鼻月生三明正為南方盡南乃拈起主丈云善財童子來也卓一下云元來却是觀世音菩薩施主請上堂三世諸佛同此一音演出一大藏教一大藏教不用箇元字脚出生三世諸佛經即諸佛諸佛即經無二無二分無別無斷故乃拈起主丈云這箇是山僧主丈子佛之與經在甚麼處卓一下云大啟毗盧樓閣門亞竪摩醯頂門眼乃舉僧問臨濟和尚如何是三眼國土濟云我與汝入淨妙國土著清淨衣說法身佛入無差別國土著無差別衣說報身佛入解脫國土著光明衣說化身佛大眾臨濟小廝兒分身法報化著却三種衣至今脫不下山僧今日不著三種衣不說三身佛只以信女所施法衣搭在肩上如法而說汝等諸人亦當如法而聽乃拈起袈裟角普示大眾良久云須是金色頭陀始得南臺道友請小參見聞如幻翳三界若空花聞復翳根除塵消覺圓淨乃拈起主丈云見麼卓一下云聞麼既有見有聞則如幻如翳作麼生得聞復翳根除塵消覺圓淨去饒你淨極光通達寂照含虗空却來觀世間猶如夢中事到雪峯門下沙彌童行堂中未到著你在不見真覺和尚示眾云望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也大眾古人三處待人不為不厚其柰禮煩即亂水煩即濃山僧不然但有來者現成以一座雪峯山待之忽若把得便坐斷佛祖出頭不得也許伊具一隻眼忽若把得便行到處裏流通將去也許伊具一隻眼更有一隻眼留待諸人後次入山別有理論久立祈雨上堂拈起主丈云主丈子黑似漆不用時唯靠壁用著時甚生力日月合其明天地合其德積陰為之暘亢陽為之澤而今是亢陽須雨之時主丈子惺惺著乃卓一下云向道是龍剛不信待興雷雨始知驚病僧請小參兼謝護國禪師堪笑堪嗟可悲可喜板齒生毛猢猻沒尾盡大地如許廣濶覔箇舉話底人也難得莫道會禪今者八州管內只有護國老較些子山僧頃年甌阜疎山眉毛相結是時已輸其先而今象骨丹山鼻孔相拄又落其後是伊何曾動著一步山僧用盡氣力終趕不上你諸人且道病在甚麼處今晨本擬請此老為諸人點出這病痛盖為法座粧嚴未畢況此老是架五鳳樓手段別處頓放他不得不比雪峯上大人禪到處裏得說便說所以前日室中問兄弟你還會上大人麼祗對者甚多悟明者極少理既多途禪尤多病有般隨語生解阿師便道丘乙己或道可知禮也或一向道不會或一向高禪將去如此之類皆病非法山僧今夜因病僧請說法與汝諸人一一拈出佛病祖病心病禪病奇特病平實病依他病獨脫病八苦交煎四百四病八萬四千塵勞煩惱之病乃卓主丈一下云向這裏一時百雜碎諸病既除不妨快活且道那箇是法而今莫有道得底麼如無還我上大人來請護國上堂今朝七月初一寶盖新粧法座新漆二者既新須得大手段震大法雷霪大法雨方顯此座之高廣雪峯只是萬百年陳故上大人禪且與諸人作箇定場別更有賽大眾正宗難續正法難聞正士難見正道難行而今要行正道見正士聞正法續正宗下座同伸拜請護國澹菴和尚陞于此座使現前一眾咸知黃龍草堂正法眼藏向這瞎驢邊滅上堂舉真覺和尚道枯木藏龍雷動必驚驚者少不驚者多大眾真覺好龍要且爪牙未備頭角不全何故若是爪牙備頭角全終不肯向多多少少處計較山僧不然枯木藏龍雷動必驚乃卓主丈一下云驚者雲騰致雨不驚者露結為霜上堂舉僧問睦州和尚以一重去一重即不問不以一重去一重時如何州云昨日㘽茄子今日種冬瓜好諸兄弟只是未有人承當後來叢林中或作即事即真會却或作時節因緣商量却孤負先聖埋沒己靈而今雪峯山中參禪會便會切不得妄有主張昨日㘽茄子今日種冬瓜作麼生若也會去前此相煩亮禪乞茄歸來未曾陳謝若也不會妙湛和尚忌晨正當今日解夏小參兄弟時光易失剎那剎那念念念念一時一時一日一日直至九十日為一夏汝等後生家九十日中出入息內過却幾恒河明朝又是解夏也今夜鳴鐘擊皷聚集少時已證入未證入已諦當未諦當今者幸遇我空王如來垂慈咸放十字街頭廖胡子聞與麼道醉夢中打兩个筋斗起來連呌數聲快活快活雪嶺泥牛出海方山鼻孔遼天引得猪肉桉頭鄧屠魚行內李媼說禪說道眼空四海閻老子鋪席頓然蕭索冷地裏怒得頷腮下癭大如斗山僧主丈子却呵呵大笑道你這一隊窮鬼子且莫空自歡喜妄自煩惱須知道江南兩浙春寒秋熱喝一喝卓主丈下座上堂雪峯山中解夏三門開放兩邊去底觀音勢至來底文殊普賢問訊問訊文殊普賢珍重珍重觀音勢至是你這一火子老老大大來來去去有甚了期來底且與老僧做街坊去底且與老僧做化主何故來底去底總不放過會麼扶竪天下大叢林須是這般菩薩子好大哥小參今夜是幹楞嚴會四人兄弟請小參不免因風吹火散夏三日也諸兄弟深山裏秋來轉見寂寞山僧而今發心作个主人管領你諸兄弟些小又不得不如每人與你一座雪峯山去只如許多人一箇雪峯山又如何分得徧會麼但辨肯心管取具足今日雪峯不比往時兄弟若不是有力量人大家出手扶持立見厨寒無煙鐘魚不鳴空上座雖然住院只是箇禪和子去住尋常其柰先聖道場要人整頓不是小事你輩兄弟當此時節如同船遇風胡越可使為左右手況祖師門下客自家家裏人其忍坐視恬不為意大丈夫勇於為義大家出來一似夏內大佛殿上諷楞嚴呪相似異口同聲吼一上無見頂相無為心佛應念現前呪道圓成又如鋸火一般火無定位但不緩慢不中輟則火事現前做化主亦復如是他州異縣各不相識只當人辨一片真實心從之者沛然如水就下則化道成辨兄弟諷呪要進前鋸火要著力化主要發心且道踞師子床坐在眾人前底又要个甚麼你兄弟今夜這裏立地忽若一時悟去山僧磨墨與你寫疏上堂雪峯一說應時應節赫日炎天紛紛雨雪是何之說稱鎚是銕西禪懶菴和尚遺書至上堂石霜山中獨虎生得三脚驢兒走過萍實楚江踢倒湖南長老由是子子孫孫承承繼繼吞底是栗棘蓬透底是金剛圈西禪懶菴和尚楊岐遠孫妙喜長子三法席一味是懶宗風益振佛日彌光今者法門不幸遽爾真歸真即不無且道懶作何面目若見不得下座更往靈前燒香作禮教這懶菴老子無著懶處送南泉入菴上堂容吞舟之鱗必有滔天之水起摩霄之翼須得持世之風南泉慈覺大禪師佛海吞舟之鱗祖天摩霄之翼今者自忘其大來入雪山雪山既無滔天之水又無持世之風將容之則無所欲起之則無力幸而去此善法堂不遠有臥雲老人舊隱之東菴伏望禪師不忘廼祖暫此韜藏然雖如是空上座終是疑著何故只恐藏之藏不得上堂守住本覺無繩自縛解得他去猶隔西天快人一言快馬一鞭而今有箇入得仲秋漸凉山僧敢保伊應時納祐喝一喝下座上堂拈主丈云寒山舞拾得笑豐干一曲無羗調囉囉哩哩哩囉近日秋林落葉多卓一卓下座葉尚書宅請上堂以生論死死無當生之死以死論生生無即死之生生無即死之生非生也死無當生之死非死也非死非生圓同大虗無欠無餘良由取捨所以不如以如今不了故現在晨昏千營萬計匍匐三界纏綿死生見不超色聞不出聲是故如來明見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異不如三界見於三界釋迦老子與麼說話大似看窟竉著木榍不落生死底句要且未曾道著雪峯今日於判院朝奉小祥之晨因風吹火一要照看釋迦老子面皮厚多少二要顯發判院朝奉本地風光三要使其子子孫孫於無盡大光明藏中受用無盡乃以拂子於空中點一點云還相委悉麼三要印開朱點窄不容擬議主賓分以拂子擊繩床下座大風雨後上堂臨濟三回喫六十棒普化兩度趯倒飯床定上座空拳築殺尿床鬼子周金剛白棒佛來也打一似大風雨皷蕩直無前衲僧所得法用處亦如是雖然如是黃潦無源朝滿夕除即不問你衲僧家金剛眼睛因甚爛如泥喝一喝卓主丈下座到幽巖上堂問答罷乃噓一聲自云作甚麼雪峯入雷峯來大似小巫逢大巫神氣俱盡神氣既盡又將甚麼陞于此座說如是法不借主人威光如何兩得相見乃取主丈卓一下云果然得渠力洎不入山來又連卓兩下云一等是聒譟主人出歸上堂舉雲門和尚示眾云只這个帶累殺人雲門尋常氣宇如王作恁麼說話大似貧恨一身多山僧不然只這个快活殺人何故大雨方歸屋裏坐業風吹又遶山行然雖如是也是乞兒見小利不傷物義一句作麼生道上堂舉世尊於靈山會上拈花示眾時迦葉尊者破顏微笑世尊云吾有正法眼藏涅槃妙心分付摩訶迦葉大眾迦葉幸自好眼彩剛被釋迦老子瞎却而今莫有逈超先聖別立玄風底麼出來救取迦葉如無到處瞎人眼卒未有了日上堂舉君不見絕學無為閑道人𮨇視左右云在甚麼處不除妄想不求真喚來與老僧洗脚無明實性即佛性退後退後洗脚也不中幻化空身即法身便喝永嘉大師項上三百斤銕枷拈了也如今還有知永嘉落處底麼如無三十年後莫道雪峯龍頭虵尾上堂舉保寧和尚示眾云保寧飯食麤惡別無精妙品饌供養諸人既到這裏開單展鉢須是喫得這無滋味始得若喫不得且莫怪大眾保寧先代叢林早是供養如法比之雪峯今日大不干事你諸人纔入雪峯門便是墮在那洛伽中坐臥底是熱銕床喫底是熱銕丸飲底是熱銕汁有甚麼滋味到你尚自不知不覺何況保寧無滋味無滋味有滋味上方香積無根蔕莫似將錢買李只揀赤邊咬臘月三十日怪雪峯不得香林寺請上堂大無外小無內無內無外七處九會是聖是凡重重無礙捩轉鼻孔須彌粉碎乃拈拄杖竪起云看看西天摩竭陀國人見你雪峯山中禪和子參禪不易總來山僧拄杖頭舞雲韶之曲供養你諸人更與你舉悉怛多般怛羅無上神呪曰懷州牛喫禾益州馬腹脹天下覔醫人灸猪左膊上乃呵呵大笑云將謂摩竭陀國人元來只是杜順和尚卓拄杖一下復舉外道問佛不問有言不問無言世尊據坐外道讚嘆云世尊大慈大悲開我迷雲令我得入禮拜而去阿難問外道有何所見禮拜讚嘆而去世尊云如世良馬見鞭影而行大眾山僧而今也不據坐良久亦不大慈大悲亦不開汝迷雲還有入得底麼乃喝一喝云不可總作外道見解上堂禪家流見也見得是道也道得著語妙山僧不如機鋒山僧不及既不如又不及為甚却道他未在不省這个意修行徒苦辛上堂法法本來法無法無非法何於一法中有法有不法上是天下是地那个是本來法飢有飯困有睡熱則隨處取凉寒則歸寮向火何於一法中有法有不法山僧與麼注解明眼人應是笑怪既開這門戶只要人解笑今日十月初一是个寮內與伊開个火爐子不敢望你向火𦦨上轉大法輪只等你瞌睡時和鼻孔燒却方始好笑喝一喝云笑个甚麼上堂拈起拄杖云雲門大師道凡夫實謂之有二乘㭊謂之無緣覺謂之幻有菩薩當體即空衲僧見拄杖但喚作拄杖行但行坐但坐總不得動著師舉了乃呵呵大笑云這个是雲門大師孩視你天下衲僧處既把你與麼安排著更教你不得動著叵耐乃卓拄杖一下舉起云凡夫聲聞緣覺菩薩衲僧雲門一時穿了也動得底一任動著擲拄杖下座上堂僧問一漚起湛海不搖清徹底漂漂海上出沒間成壞猶來一彈指拈了也正當與麼時亡僧遷化向甚麼處去師云大眾證明僧云與麼則隨分著衣喫飯去了無別事師云你向甚麼處見亡僧僧云遍界不能逃形質一毫頭上現全身師云埋沒亡僧不少僧云記得玄沙問真覺和尚亡僧遷化向甚麼處去覺云如氷歸水玄沙不肯真覺却問子又作麼生沙云如水歸氷意旨如何師云總未得脫洒在僧云如何是脫洒底句師云銕索橋頭大目溪僧禮拜師云若作脫洒會入地獄如箭師乃云洞山道天晴盖却屋乘時刈却禾輸納王租了皷腹唱謳歌古人住山得與麼了事得與麼快活雪峯有屋盖未了有禾收未上有租未納破方待皷腹謳歌而顗都莊又遷化苦苦敢問大眾一等是出家兒一等是住山人為甚苦樂不同會麼曹溪波浪如相似無限平人被陸沉喝一喝下座上堂低頭不見地仰面不見天欲知白牛處但看髑髏前以拄杖卓東邊云真覺和尚這邊立地向上一路千聖不傳學者勞形如猿捉影以拄杖卓西邊云盤山和尚這邊立地咄咄咄力囗希禪子訝中眉垂以拄杖卓中間云雲門和尚這裏立地這三个老漢且道那个今日合得雪峯胡餅喫點得出底試與雪峯點出看三玄宗旨要且不是萬病丸一語不玄流俗阿師便下座及巡寮徧問兄弟祗對者非一師云有口不得胡餅喫人多上堂舉洞山和尚示眾云須知有佛向上事僧便問如何是向上事山云非佛雲門大師道名不得狀不得所以言非後來妙喜老子道我這裏不然如何是佛向上事拽拄杖劈脊便打免教伊在佛向上倒跟大眾洞山大開却口了合不得被人問著盡力只道得个非佛更有雲門跛阿師無特操又却隨邪逐惡只有妙喜較些子撿點將來棒頭少硬這三个老漢要作善知識則可若是佛向上事總未夢見而今還有夢見底麼喝一喝下座上堂一漚未起古帆未挂風信不來無人舉棹正當與麼時如何辨的忽有个漢向這裏一破却來觀世間好个則劇術這則劇術或在家則為童孺為士夫出家則為苦行為比丘迷之則迷入四生六道悟之則悟成諸佛菩薩在諸佛菩薩則不增在四生六道則不減在比丘亦不優在苦行亦不劣既是不劣不優不增不減乃拈起拄杖云這拄杖子因甚出頭來指天指地道天上天下唯我獨尊會麼良久云家肥生孝子國覇有謀臣乃舉甘贄行者於南泉設粥泉白槌云請大眾為狸奴白牯念摩訶般若波羅蜜甘贄禮拜出去眾下堂遂問典座甘贄行者在甚麼處座云當時禮拜便出去泉乃打破粥鍋這公桉諸方味之如嚼生銕山僧今日因行者設粥與大眾頌出狸奴白牯念摩訶甘贄南泉不較多打破粥鍋何處去空山風雨夜𮨱𮨱上堂雪峯修已廢之寮立仍舊為其名記得法眼禪師道但於行住坐臥著衣喫飯朝參暮請一切仍舊諸佛如來於仍舊中得敢問大眾得个甚麼若有所得則不仍舊若無所得亦不仍舊若得無所得無得為得轉不仍舊而今若要仍舊先將法眼和尚一棒打殺與狗子喫却次將所立之牌一掣掣下拋向糞掃堆頭然後入此寮中與八人禪客耳朵裏㘽田床脚下種菜雖然未是作家且教直歲歡喜山僧與麼為人拾得口了喫水上堂釋迦出世擔雪填河達磨西來望雲種樹自後馬祖石頭德山臨濟天下老和尚乘虗接響競出頭來說心說性行棒行喝盡是亂世英雄太平姧賊衲僧分上總用不著且道衲僧尋常用个甚麼今日初一下座略到諸寮問訊上堂舉藥山道我有一句子待特牛生兒即道後來圓鑑道我有一句子待無舌人問即道此二人尊宿可謂肥不露肉瘦不露骨是即是又似太深遠山僧不然我有一句子開口見膽是即是又似太淺近若向二老句下薦得路逢死虵莫打殺若向山僧句下薦得入地獄如箭射喝一喝下座上堂山僧入城有三段奇特事今日歸來鳴皷陞堂舉似大眾第一南臺江水穿過方山鼻孔第二萬歲塔與報恩塔鬪額第三山前李胡子騎箇蹇驢兒從皷門下出來道看馬看馬山僧簥裏坐却記得洞山和尚道一大藏教只是箇之字只此奉聞伏希聰悉光孝禪師至上堂僧問象骨岩高人不到到者須是弄虵手棱師備師不柰何喪身失命知多少既遇作者到來未審和尚如何祇接師云煑茶山下水燒鼎洞中樵僧云與麼則麤茶喫一椀淡話說雨聲師云禮繁則亂僧云記得藥山道我有一句子待特牛生兒即向汝道而今生也請師道師云面皮三寸未為厚僧云和尚道則太煞道學人要且未甘師云進前渾不覺退後始愁人僧云圓鑑又道我有一句子待無舌人問即道又作麼生師云前頭較些子後頭打不著僧云和尚曾道我有一句子開口見膳為甚麼却難會師云會得打折尔脚僧云莫不會便是麼師便打乃云大野雲凝千峯寒色飛鴻斷路古道難登不謂光孝堂上禪師遠揚法斾來訪寂寥感激之懷言莫能盡下座當與知事大眾同伸拜請陞于此座以副眾望大眾古者道欲得英俊仍須四事俱備方顯宗師蹊徑一者祖師巴鼻二具金剛眼睛三有師子爪牙四得衲僧殺活拄杖得此四事縱橫變態任運卷舒高聳人天壁立千仞儻不諧此守死而善道者敗軍之兆禪師法門宿將佛日真子而此四事乃其家常茶飯其柰雪峯山中禪和或未之聞伏望不悋慈悲略垂隻手冬至夜小參拈拄杖卓一下云毗盧大樓閣八字打開了也不論久參初學普請入來一入則一切入一了則一切了便能坐斷毗盧頂不稟釋迦文當恁麼時彌勒收身避路雪峯留口喫飯何故盖是諸人如實而證如實而入如實而了如實而見即心即佛用不著非心非佛用不著五位三路用不得德山棒臨濟喝用不著但有言說總用不著既用不著又說不得雪峯今夜鳴鐘擊皷聚集諸人不可只麼休去即心佛非心佛歷世明明無別物即此真心是我心我心猶是權機出或五位或三路施設隨機巧回互不觸當今是本宗展手通玄亡佛祖德山棒臨濟喝獨出乾坤解橫抹從頭誰敢亂區分多口阿師不能說前頭為甚麼用不著說不得後頭為甚麼說得用得莫是舌頭無骨麼莫是得底人道火不燒口麼莫是我為法王於法自在麼若與麼止宿草菴且居門外乃靠却拄杖云某朴拙無堪只可置之岩穴業緣未盡承乏于茲自春歷夏今又冬至勞他執事兄弟推誠竭力共建法幢荷他方來兄弟忍飢食淡同此道聚法門衰弱無甚此時正賴有高遠志見兄弟出來大家扶竪此心誠所渴望雪峯山中寒又寒寂寞又寂寞今日有些果子不能等到夜又先喫了只記得洞山與泰首座喫果子次洞山道有一物上拄天下拄地黑似漆常在動用中動用中收不得且道過在甚麼處首座云過在動用中山令侍者掇退果卓山僧當時若作泰首座待他問過在甚麼處只向他道著甚死急待他擬開口趯翻果卓便行直饒洞山全機也較三十里上堂雪峯禪無星子只見陞堂打皷賺得大眾上來近日山中有虎乃喝一喝云長至令晨顛言倒語上堂佛以一音演說法眾生隨類各得解乃拈起拄杖云山僧拄杖變作釋迦老子了也卓一下云說則不妨說且作麼生解若也解得燈籠合掌若也不解露柱證明擲拄杖下座上堂祖師心印堪作何用無位真人屎也不直獨步青霄徒誇好手和泥合水罕遇同流敢問諸人生相慶死相吊出相送入相迎底一句作麼生道若道不得下座更詣諸寮問訊上堂舉趙州和尚示眾云老僧有時拈起一枝草作丈六金身後來翠岩道趙州老漢誑赫閭閻若是翠岩拈起一枝草只喚作一枝草師呵呵大笑云殺人須見血為人須為徹這兩个老漢一人失之太奢一人失之太儉汝等諸人千聞不如一見乃拈起拄杖云且道是丈六金身是一枝草快與快與擲拄杖下座秀峯和尚到上堂舉泉大道訪慈明明云片雲橫谷口游人甚處來泉顧視左右云夜來何處火燒出故人墳明云未在更道始得泉作虎聲明打一坐具泉推明就坐明却作虎聲泉云某甲參七十餘人善知識今日始遇作家大眾大道遇作家何似雪峯今日遇作家上堂拈拄杖云大眾雲門大師來也卓一下云臘月二十五上堂舉一拳拳倒黃鶴樓一趯趯翻鸚鵡洲有意氣時添意氣不風流處也風流俊哉俊哉快活快活一似十七八歲少年作狀元相似誰管你天誰管你地心王不妄動六國一時通罷拈三尺劒休弄一張弓自在自在快活快活恰似七八十老人作宰相相似風以時雨以時五穀植萬民安乃竪起拄杖云大眾這兩箇并山僧拄杖子共作得一箇衲僧到雪峯門下但知隨例飡䭔子也得三文買草鞋喝一喝卓拄杖下座上堂舉疎山一日訪岩頭頭見來乃佯睡山立地良久拍繩床一下岩頭云作甚麼山云和尚且瞌睡拂袖便行岩云三十年弄馬騎今日被子撲後來死心道岩頭水泄不通被疎山輕輕一拶直得瓦解氷消大眾大小死心只具一隻眼殊不知疎山這手藏之懷袖佛眼看不見及乎忍俊不禁却被瞌睡漢破上堂啐之機暫時活計清虗之理不可依憑執之失度必入邪路東海鯉魚打一棒陝府銕牛兩角折即不問你諸人水不洗水一句作麼生道若道不得五九盡日又逢春上堂一刀兩斷未稱衲僧就下平高難為作者古人到這裏口似匾擔善則甚善要且無出身路雪峯到這裏又作麼生良久云後五日看退院上堂拈起一張弓架起一隻箭等閑一發定天山即不問你拋了弓擲下箭撒手到家人不識鵲噪鴉鳴栢樹間又作麼生且得天下太平便歸東菴秉炬胞胎未具已前早與麼既具之後至於生至於老至於病至於死也與麼而今大眾相送舁置涅槃臺上也則與麼三段既皆與麼又甚處得祖師巴鼻來徹上座與麼也不得不與麼也不得與麼不與麼總不得若向這裏出得一頭地誰敢喚你作亡僧其或未然火把子沒人情亡僧遷化氷歸水真覺祖師甚處得這消息來亡僧遷化水歸氷玄沙備頭陀甚處得這消息來正當今日還你如氷歸水拈却如水歸氷顧視大眾云亡僧遷化向甚麼處去若道不得待你諸人似才上座時即向你道象骨峯前虗空撲落烏石嶺頭紅旗閃爍涅槃臺上西方極樂山僧手中末後一著乃以火炬指大眾又指亡僧云開眼也著合眼也著無位真人赤身露體走過烏石嶺頭跌倒白雲堆裏乃竪起火把云不是這光明炬其餘扶伊不起法語一切處是道流放身命處一切處是道流調心處一切處是道流受用無盡之藏一切處即非一切處是名一切處多見學道人心量狹劣只於一機一境上得少為足便剛然休去長連床上飽飯噇眠一切不理自謂快活窮鬼子似這般底有甚用處打殺百千萬箇無罪過如今雪峯門下誰敢一箇箇是師子兒吒沙地眼似銅鈴輕輕點著上門上戶咬人火急雖然如是猶在半途末後一句始到牢關乞食歸來未怕爛却至道無難求之者自作艱難真心本淨行之者自為染污所以日用之中千差萬別自取流轉不知何者為心何者為道若是箇猛利漢當其流轉之時一悟悟去便解道心之與道元來只是雪峯烏石嶺達禪持入五羊徧以示人當有聞絃賞音者耳從上達人於道或已悟或未悟率多入闤闠中游履不獨依止山林如盤山保壽長汀普化之流究竟於中成就己事故達磨祖師曰若從事上得解者氣力壯從事中見法者即處處不失念若是與麼人放在八達衢頭或逆或順種種運為跳踉顛蹶悉顯不思議大解脫力今天台珠道人久捿雪嶺老僧乍住無可官領他從此南行過七城有番禺大府其中善男信女多具大乘種性汝當於彼大作佛事所謂鎮海明珠者非汝而誰行矣勉之英俊道流到處與人相見不消一是有是無是邪是正更無毫髮許透漏若假一言半句定當然後方知是欺負你了也今時一種風範直是好笑如袖紙燒香求偈頌覔法語之類是也更有一般瞎老師不弁來機便向他雪色紙上屙一堆學家珍藏以為護身符子苦哉苦哉秦溪鵬道人昔甞見之披秀今又訪余東山將歸故効今時袖中出紙意在換東山眼睛東山識得渠將錯就錯也向上頭屙一堆子不獨使鵬厭惡唾罵且要今時求法語禪和看見知是屎臭氣別有生涯呵呵東山老漢有少業緣未盡昨出頭來一時償却而今安樂一菴不辜你輩兄弟自是你兄弟家不識好惡將謂東山有多少奇特到伊競來鑽刺又要我以洗脚水驀頭驀面潑還識羞麼說佛說祖舉古舉今向上向下有句無句與麼不與麼是洗脚水潑你不著佛求不著法求不著僧求向父母未生已前會取風塵草動悉究端倪是安排你向尿坑裏著衲僧家用處如擊石火似閃電光聲前喝句後棒略露些子鋒鋩擬不擬當頭一钁剔起便行是把撮馬糞漢待他即心非心就理就事五位三路全提半提雙明單說有玄有要有賓有主有縱有奪有圓相有默論凡有言說無言說皆是喚狗與食向搕𢶍堆頭埋却你我而今忍不住把將從上佛佛祖祖天下老和尚留下許多潑你底惡水埋却你底搕𢶍挈作一桶瀉放大目溪裏流出西峽門去也更無一法盖得你等得你一箇箇出來如師子子吒沙地哮吼一聲狐群膽落豈不快哉是你如今出門三步忽有人問東山住菴近日說甚麼法又如何祗對對得對不得盡是滅胡種去去拈古世尊纔生下一手指天一手指地周行七步目顧四方云天上天下唯我獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平東山曰雲門好手只是無大人相世尊臨入涅槃文殊請佛再轉法輪世尊咄云文殊吾四十九年住世未曾說一字汝請再轉法輪是吾曾轉法輪耶東山曰且道世尊從文殊請不從文殊請文殊一日令善財採藥云是藥者採將來善財遍採無不是藥却來白云無不是藥殊云是藥採將來善財乃拈一枝草度與文殊殊提起示眾云此藥能殺人亦能活人東山曰善財拈來只是尋常草木文殊提起未為出格神醫後人望風乃高其價東山謂伊兩人未免俱在草裏達磨謂門人曰時將至矣汝等盍各言所得時有道副對曰如我所見不執文字不離文字而為道用磨云汝得吾皮尼總持曰如我所解如慶喜見阿閦佛國一見更不再見磨云汝得吾肉道育曰四大本空五陰非有而我見處無一法可當情磨云汝得吾骨慧可出禮拜依位而立磨云汝得吾髓乃傳衣付偈大陽明安云且道更有一人出來得箇甚麼乃云不得不得又云意況不到東山曰明安枉費許多分疎若是那一人便肯出來布袋和尚常負一布袋并破席於通衢往來袋中鉢盂木履魚飯菜肉瓦石土木諸般總有或於稠人處打開云看看又拈起問人這箇喚作甚麼東山曰長汀子些兒活計到處裏賣弄我當時若見欄腮皷兩掌奪下這破布袋看他如何變豹忠國師一日喚侍者侍者應喏如是三喚三應國師云將謂吾辜負汝却是汝辜負吾東山曰我尋常只是因風吹火國師費許多氣力作甚麼甘贄行者因化主至乃問是甚處云藥山者云還將得藥來麼主云未審有甚麼病者欣然取銀百兩施之復云山中有人此物乃回主尋歸山納疏藥山問子何遽歸主即敘前話山云急送還他子遭賊了也主及送還者云山中有人更添銀施之東山曰賊物是人怕藥山老漢亦自小膽若是東山即便收下何故且教甘贄這老賊疑三十年南泉示眾云王老師賣身去也還有人買麼時有僧出眾云某甲買師云不作貴不作賤你作麼生買僧無對趙州云明年與和尚作領布衫臥龍球云和尚屬某甲澄源代云是何道理明招便拍傍僧背云好著不著去雪竇云雖然作家競買要且不解輸機且道南泉還肯麼雪豆也擬酬箇價直令南泉進且無門退亦無路良久云別處容和尚不得東山曰南泉一身諸老競買雖然各各買下未見有箇用得東山今日不費一錢買得用得驀拈拄杖竪起云南泉來也卓一下拄行三五步乃問僧南泉豈不是在池州僧云是山便打南泉同歸宗麻谷去禮覲國師路次於地上𦘕一圓相云道得即去宗便於圓相中坐谷便作女人拜師云與麼則不去也宗云是甚麼心行師於是相喚回東山曰一人賓中有主一人主中有賓一人不落賓主若也甄明得出許你親見國師南泉同魯祖歸宗杉山喫茶次魯祖提起盞云世界成時便有這箇泉云今人只識這箇不識世界宗云是泉云師兄莫同此見麼宗却拈起盞云向世界未成時道得麼泉作掌勢宗以面作承掌勢東山曰這一火子喫茶也不了識甚世界好與三十棒百丈再參馬祖侍立次祖以目視禪床角拂子師云即此用離此用祖曰你向後開兩片皮將何為人師取拂竪起祖曰即此用離此用師挂拂舊處祖振威一喝百丈直得三日耳聾雪豆云奇怪諸禪德如今列其派者甚多究其源者極少總道百丈於喝下大悟還端的也無然刁刀相似魚魯參差若是明眼漢瞞他一點不得只如馬祖道你向後開兩片皮將何為人百丈竪起拂子為復如虫禦木為復啐同時諸人要會三日耳聾麼大冶精金應無變色東山曰挂拂舊處彼此休去百丈兒孫不到今日大冶精金應無變色雪豆著甚處死急趙州到黃檗檗見來便閉却門州云救火救火檗便出擒住云道道州云賊過後張弓東山曰黃檗從來有此一著紫湖禪師於門下立牌大書云紫湖有狗上取人頭中取人腰下取人足擬議則喪身失命或新到纔相看師便喝云看狗僧纔回首師便歸方丈雪豆云眾中總道這僧著一口著即著了也爭柰這僧在若具知方眼救得這僧設使紫湖出世咬殺百千萬箇有甚益我當時若見先斫下牌然後入院待這老漢喝云看狗與伊放出焦尾大虫如今諸人要見麼日勢稍晚歸堂東山曰我行脚時但有狗處無不驗過不學雪豆恃賴焦尾大虫斫牌入院我只恁麼與尋常新到一般待伊喝云看狗也則回首待伊纔歸方丈也則拂袖便行出門人問如何對曰山僧已與驗過太原孚上座參雪峯纔上法堂顧視雪峯便下看知事至明日入方丈作禮云昨日觸悞和尚峯云知是般事便休東山曰雪峯見德山時事向甚麼處去也大小太原孚只具一隻眼香嚴示眾云如人在千尺懸崕口含樹枝手無所攀脚無所蹈忽有人問西來意不對則違他所問若對又喪身失命當恁麼時如何即是時有虎頭上座云上樹即不問未上樹請和尚道嚴呵呵大笑雪豆云樹上道即易樹下道即難老僧上樹也致將一問來東山曰樹上樹下道易道難總涉廉纖如今好問又不問睦州和尚因秀才相看云會二十四家書師以拄杖空中點一點云會麼才罔措師云又道會二十四家書永字八法也不識東山曰沙門種子胸中初無點墨動著筆頭便見心肝五臟這措大因甚特地罔措睦州示眾云裂開也在我揑聚也在我有僧問如何是裂開師云三九二十七菩提涅槃真如解脫即心即佛我且與麼你又作麼生僧云某甲不與麼道師云盞子落地揲子成七八片雲峯悅云相罵饒汝接觜相唾饒汝潑水東山曰雲峯饒伊不是好心我直向你道睦州至竟欠一著在若人見得許你頂門具眼臨濟會下兩堂首座忽舉頭相顧各下一喝臨濟云賓主歷然承天宗云臨濟此語走殺天下衲僧我即不然一對無孔鐵鎚東山曰承天自住山則可若要發明臨濟主賓句東山未敢相許臨濟因趙州到院在後架洗脚次師便問如何是祖師西來意州云恰值山僧洗脚師近前作聽勢州云會即便會㗖作麼師便歸方丈州云三十年行脚今日為人下注脚東山曰臨濟㗖趙州注脚兩箇老漢放過一著臨濟示眾云有一無位真人常從汝等諸人面門出入未證據者看看時有僧出問如何是無位真人師下繩床搊住云道道僧無語師托開云無位真人是甚麼乾屎橛雪峯云臨濟大似白拈賊東山曰若是白拈賊必應好手為甚麼向這僧面前一無所得臨濟侍德山次山云今日困師云這老漢𥧌語作麼山便打師掀倒繩床雪豆云二員作者具啐同時眼有啐同時用雪豆擬向飢鷹爪下奪肉餓虎口裏爭飡敢謂德山臨濟俱是瞎漢有人辨得天下橫行雲峯悅云奇怪諸禪德看此二員作家一拶一捺略露風規大似把手上高山雖然如是未免旁觀者哂喝一喝東山舉了呵呵大笑曰說甚麼作家相見啐同時說甚麼一拶一捺略露風規都來只是兩个風顛漢金峯示眾云金峯二十年前有老婆心二十年後無老婆心時有僧問如何是二十年前有老婆心峯云問凡答凡問聖答聖僧云如何是二十年後無老婆心峯云問凡不答凡問聖不答聖東山曰金峯至竟老婆心黃檗一日捧鉢坐南泉位泉入堂見問長老甚年中行道檗云威音王已前泉云猶是王老師兒孫在蘗過第二位坐泉休去雲峯悅云後來叢林中商量或道黃檗有陷虎之機南泉有殺虎之威若作與麼說話誠實苦哉殊不知這老賊有年無德喫飯坐處也不依本分若雲峯門下說甚威音王已前王老師更大直須喫棒趂出妙喜曰何待問他甚年行道纔入僧堂見他在主位坐便捧鉢向第二位坐直饒黃檗有陷虎之機擬向甚處施設東山曰進以禮退以禮古人事無一向雲峯盡法無民妙喜設心最毒山僧今日放低一頭地與你諸人理論乃高聲召大眾眾舉頭師云各請歸堂莫教失却鉢位予政和初甞從石鞏新公得馬祖四家錄其後載臨濟與婆子問答語婆問濟甚麼處去濟云鳳林去婆云恰值鳳林不在濟云甚麼處去婆便行濟召婆婆回首濟便行予甞喜其用處如師子象王回旋反擲自在無畏不墮常情今統要中與近開四家錄皆作婆回首濟云誰道不在語既嫩弱意又淺近謂是出於臨濟豈不重欺古人必昧者更之務救前語殊不知蕪纇先德疑悞後學為害至大今古本淪亡殆盡恐後來不悟其非因拈至此乃附之卷末云頌古不是風兮不是幡祖師端的廣南蠻夜深趂得曹溪渡失却番禺兩岸山馬師瞎却亮師眼一入西山更不返我有二十二藤條寄與山中這擔板楚王城畔水東流淮海維楊是九州蘆管一聲春夢破斜陽還在樹梢頭說似一物則不中箇是南岳讓和尚東山早曾與麼來帶累同行俱喫棒新婦騎驢阿家牽潦倒禪翁雪滿顛不解爐頭煨死火客來偏愛出人前大食波斯飲百柸停柸把萬人魁送風使過黃牛峽不問瞿塘灔澦堆德山棒臨濟喝寸刃未施先敗闕叢林盡謂是上機明眼衲僧也大屈龐公慙愧全無馬祖慈悲心大直饒吸盡西江東山未向伊道引鼻拽回野鴨元來却是家雞不管晦明風雨纔到五更便啼身披麤布伽梨手把大木槵子天寒坐火爐頭動是說虵說虎我手何似佛手拈起扇子擗口打落帝釋花冠却是寒山掃我脚何似驢脚車輪頓生八角三千剎海波澄一陣西風葉落人人盡有生緣落花流出桃源過後再尋無處滿簑烟雨漁村佛手驢脚生緣三山影落中天武帝多方學道王喬端坐神仙一等作野狐堂堂大丈夫徐行青草岸踏破洞庭湖靈雲失脚玄沙落壍三十年氷河發焰是法非思量分別之所能解錢塘潮頭來成都藥市集叵尀汝州風吹落老僧笠南瞻部洲鉏地東弗于逮種麥西瞿耶尼拽磨北單越喫麵百書不如一歸家千聞不如一見面既歸既見復何為解道德山無佛殿泥人煅就九轉丹石女一喫乘飛鸞天門九重彈指間再拜天帝除天官瓜期既及風馭還海變桑田知幾番又尋東山訪平安去時與偈墨未乾𣤩瞎大地眾生眼奪其一切資生物盡情推入大火坑聽從阿耨池中出然後為念普安慰真言唵摩尼佛㖃屈聿看洞山初和尚語兩頭蚯蚓呈三要五眼胡孫念八還老蚌吞除龍樹月瞎驢撞出趙州關頌草堂老師付頂相讚後圓相因禪人請益六國朝閶闔三山插杳冥禪流相借問冬後一陽生覧妙喜和尚衡陽示眾海蚌直儱侗不類海蠡兒開口便見膽也好與一槌真讚雪峯禪師㘞咸通已前正與麼㖿紹興之後端的別別別松山撐破秋空月毬門有路沒遮欄五月取霜六月雪草堂老師隨隨昔昔是這箇賊簸土揚塵馳南走北一棒打殺狗也不喫後來不肖兒孫箇箇一摸脫出造橋道者并諸化士寫求去一得三添六成四有口無舌有眼無鼻寫得十成以何為是掛在大目溪頭恰似守橋土地這漢一生擔版垂老出來住院清真氣味全消惡業因緣頓現說禪罔聖欺凡乞食走州歷縣試看幀上傳來輥得成甚觜面咄這老凍齈是甚麼面孔似馬頭又圓謂驢耳不聳有毒鱉鼻虵無底破漆桶徧處持來攪聒人十分是箇滅胡種幽岩禪師一字不著劃古錦寫回文寒山指拾得斗柄插雷門偈語圓悟禪師入滅說偈燒香時在疎山作濯錦江心一漚發清漲四溟波浪濶引得風流小玉歸無限龍魚遭攪聒紫羅帳裏明月珠把作栗蒲撩亂𥻦一方孤逈峭巍巍十字縱橫活鱍鱍我昔墮渠甕中倔強依前淹不殺而今寰宇幸清平誰道岷峨在天末昨夜西風撼太虗石牛驚走泥牛喝一吸滄溟徹底乾憍梵鉢提長吐舌大悲千眼擘不開無言童子空忉怛炷香為壽阿僧祗紹興五年八月八南華利侍者持昺和尚語至疎山請校入版乃作偈送之謁序于徐大資師川曹溪大士出現世誰其侍者道人利雷轟電激槌拂間涓滴無遺水傳器而今底事難覆藏盖是火後莖茅長未言字字負此老且要浩浩流諸方最初有箇譊訛處徧示知音著何語東山有語人未知請問東湖老居士送莫內翰驚世文章夢裏花出塵悟解眼中沙怪來不打這皷苗親見江西老作家一槌從使口如鼻百煉誰知方入圓莫怪野人高索價從來佛祖不曾傳黃龍室內三關語趙老青州一布衫何事臨分無別說則川龐老是同參試問同參參底事華亭秋晚水如天離鈎三寸無人會風起蘆花落釣船今者叢林走大聲不言無眼只無睛願公善保千鈞重莫管他家熱椀鳴次韻韓伯修學士讀楞嚴見寄琉璃甕中走却鱉驚起波斯一夜尋天曉不知何所見大悲菩薩是觀音次游教授韻呈草堂老師霜髮垂垂老不休銕船無底更隨流兒孫莫訝得魚少盖謂翁翁是直鈎北之南瞻部洲縱觀誰是老人流大千一網平收了坐看兒童亂下鈎辭草堂老師歸閩短笻初把探深深展盡神機被陸沈搦殺未償當日恨翻身誰識此時心不離左右金為土別有生涯土作金既去後來應請問莫言曾到此山陰送夢石歸妙峯德雲菴紹聖五年戊寅冬王母吞却嘉州像覺來捫腹喜且驚一朝生出這和尚銳頭長身碧兩瞳眾聚說法聲如鐘少年蹈斷象骨路出處大類飛山翁老而益健難近傍德山縮手臨濟讓善財盡力無處尋又是經行別峯上南詢歌南詢士標致殊發言落落中疎疎瘦藤一握銕相似孤身萬里雲不如作者前致一問分明直得繩床震失脚踏翻樓閣門通身不掛毗盧印佛祖言甚熱椀一劒當頭百非剗大展禪宗定古今火裏蝍蟟三隻眼空王子空王之子空而靈拈起鉢飯忘了羹一生看經不識字總十二部為一句一生說禪不動口噴啑也成師子吼阿呵呵黃面瞿曇爭柰何咄咄咄是甚衲僧臭皮襪又用前韻送僧空王子出空門敏於選佛訥於言老少同科無異學盡傾阿耨作詞源龍虎榜輝乾坤一字元無作麼分汝見是汝為第一我見是我作狀元有驚群有獨脫可中丹桂和根把作枯柴竈裏燒誰能更著空王褐只如劒成家活不犯鋒鋩有生殺莫似章分句解徒望却龍門頭枿枿禪人求偈禪家流悟自己開眼曹溪十萬里況行機路守心空病渴移家陽𦦨裏渴轉渴水又非擡頭不覺鴈南飛文殊堂裏萬菩薩大唐國內無禪師或行棒或行喝棒喝交馳如電掣不容眨眼入思惟忽把虗空敲出骨地神惡天神悅陝府銕牛得一橛且等東山睡覺來大掌連腮咄咄咄送僧蜀川老覺家潼川懷中交子是銕錢三年聽講大慈寺執卷問之不識字三年參禪大隋山盖龜劫火猶顢頇瞿塘忽放銕船下不問灔澦堆如馬逆風使過荊湖南焦茘林中來放憨同風莫倚閩與蜀飲水更須防蠱毒支提天冠千眷屬龜山蔡柳兩尊宿總在參禪屋角頭開眼光光互相燭參禪自是雲水儔四顧坤維有高躅勝妙光中不肯留六六要明三十六當其行歌一曲春草青兮春水綠東山老矣夫何言縱有言兮不堪讀東山送人只一句纔擬欽承喝出去而今更向紙上求大似因鷹拏死兔猷禪猷禪知不知堅坐守之無了時趂取西風霜未落泐潭百丈在江西煨芋後生偷笑東山老事無是非總曰好布伽梨裏老病身山芋頭煨紅軟火日暖婆娑林下行天寒堆危火邊坐人問祖室今安危對道我此煨芋好與暠副寺衲僧之勇惟法戰銕作渾身猶百煉不知誰是最讎家直入南方行一轉上門上戶眼如鈴有麼有麼機如電剔起便行何處尋聲前句後新羅箭送二僧之衡陽閩蜀同風果同風袈裟拔出鞋袋中相逢古寺話俄頃怪我稱鎚落深井不憂佛日居衡陽不憂無人振頺綱却憂秋高霜月冷銕牛夜度飛猿嶺衡陽老子一僧耳打雨罵風無別伎海上禪流未識渠將謂三頭仍六臂兩川邁往初不然我喜其行重說偈披秀菴前癩狗兒要見衡陽只這是寄支提禪師遠聽天冠化寺鐘孤煙明滅暮山重念携掛壁木上座問訊長沙岑大虫大虫聲威動海宇老不與世同其波卷藏風月付一室落日春山狐兔多威而不怒默常吼寂子觸之遭毒手東山又似不知時更來許露其家醜又送出閩老人入我閩中居如山有玉淵有珠老人一日出山去崖不自靈淵亦枯我問天冠千眷屬如何不留老尊宿飛鸞水急海天橫一道清輝照四明送深書記東海鯉魚吞却海西河師子口門大金剛喚起足行神還却趙州行脚債吹毛不是凡間銕百匝千重唯一決出頭天外笑呵呵喜得空生不曾說與符侍者秀峯三聖堂中符也曾職其事節制火筯香匙使得燈籠露柱聖僧頸上下來天台山中入去通玄不是人間忽雨忽晴忽霧出門且莫怱怱道取末後一句謝丹山秀首座竹笻老身一衲百無營病骨人驚太瘦生多謝枝笻解扶我松陰石上聽溪聲山中久住成老宿雲水五湖來弟兄放下茶甌答了話把得拄杖東西行葉居士施直裰求頌廣南葉順居士施我褐紬直裰比之七斤布衫這个猶難提掇天寒雪落便披日暖風和即脫脫著畢竟是誰慚愧觀音菩薩送行上人歸塔慧力空印和尚靈骨于西山古佛大塔廣量廓虗空界凡聖位其中如光無雜壞出生與入滅一一得自在眾生迷本心當處自留礙良哉空印師火後靈骨在憑誰密安置有子如行輩山為碧玉環水作青羅帶巍巍鎮巍巍永下諸天拜與沔上人參禪無悟處如何得安樂置之空劫前即為空劫縛任運日用中拶著無不錯懵然百不理柰此一絡索勇猛積勳修翻成大過惡端坐審思惟不如更行脚東山老病漢聞之為喜躍願爾發足時出門便蹈著與虗上人止渴須是水止飢須是飯參禪須是悟成佛不待旦伽陀有底急休來問老漢既來無柰何拄杖驀頭攛與性上人汝知東山空胸中無窖子說禪瞎人眼書偈汙人紙不知禪家流於空何所取脚要汝自行死要汝自死道不假他成佛豈離自己唯有老趙州平生一則語既是其中人東山與之舉病起老僧頭風一月兩發見粥便嘔見飯便噦死又不死活又不活使他諸人冷地忙殺觀音勢至候飢候渴文殊普賢左提右掇纔方起來便翻著襪不問是非乃棒乃喝呵呵雲門君子可八與妙菴主至道之宗備在爾躬求之則遠守之不通不求不守奇哉靈叟極離極微應心應手觸目晴嵐到處成菴捶呵彌勒不與同龕石虎擡頭泥牛入海驀劄相逢一場風采金翅擘海直取龍吞燕鷹鸇徒誇羽翰撥轉關棙子宛如珠走盤明眼衲僧著眼看癸酉至節梅陽妙喜老漢題與皷山書中一段語附雪峯空禪師頃在雲居雲門相聚老漢見渠不自欺是箇佛法中人故一味以本分鉗鎚似之後來自在別處打發大法既明向所受過底鉗鎚一時得受用方知妙喜不以佛法當人情去年送得一冊語錄來造次顛沛不失臨濟宗旨令送在眾寮中與衲子輩看老漢因掇筆書其後特為發揚使本分衲子為將來說法之式若使老漢初為渠拖泥帶水說老婆禪眼開後定罵我無疑云云頂相讚附慧空抓著吾痒處吾甞劄著伊痛處痛處痒痒處痛不與千聖同途豈與衲僧共用莫言掃帚竹裏無錢筒篙枝叢內無梁棟雖然家醜不可外揚也要諸方眼目定動而今各自不得已一任𦘕出這般不唧𠺕底老凍齈但將懸向壁角落頭使來者瞻之仰之晝夜六時燒兜樓婆畢力迦沈水旃檀之香作七代祖翁之供福州雪峯東山慧空禪師本郡人族陳氏十四圓頂出嶺偕妙喜同參圓悟于雲居已而復道聚雲門菴及禮六祖歸抵疎山參侍草堂日臻玄奧服勤有年入閩久之紹興癸酉安撫龍學侍郎張公宗元致禮敦請開法郡之雪峯徇緣一載退歸東菴戊寅三月十三日示寂壽六十三臘四十八貞和己丑仲冬寓于龜山雲居僧妙葩命工刊行羅湖野錄曰福州空首座在江西雲門菴一日妙喜老師問其香嚴上樹話對以好對春風唱鷓鴣及徵之是樹上語是樹下語空罔然尋避宼之曹谿復趨臨川疎山時草堂清和尚在焉因看前話有所證自謂頓見妙喜用處遂歸閩寓古田秀峰道望四馳而屢却名剎之招東禪淨禪師有偈調之曰山龜有殻藏頭尾七十二鑽不奈何恰似秀峰空首座嘉招不肯出煙蘿答曰敢將不出以為高朽索其如六馬何賴有舀谿長柄杓不妨霜月在松蘿空之偈句風韻高妙於事理尤為圓融如贈撮藥道人曰當陽拈出大家看來處分明去處端總是諸人自遮護先生毫髮不相謾又貽修漏道者曰是處叢林走一遭敲甎打瓦不辭勞忽然踏著通天竅始覺從前立處高又雪中和僧偈曰蓋覆乾坤似有功洞然明白又無蹤其如未識無蹤處玉屑霏霏落眼中曾侍郎吉甫甞有詩寄之曰江西句法空公得一向逃禪挽不回深密伽陀妙天下無人知道派中來其為名公擊節如此余昔刊東山外集喜其機用橫放欲刊內集而未得善本堂中首座珍藏久之亦有志于茲因循閱紀一月因話閒慨然募眾繡梓流通眾中豈無具眼衲僧向鉗鎚妙密處一觸觸著便知道妙喜老人所謂造次顛沛不失臨濟宗旨之語不虗其或未然劍去久矣時癸卯王正上元三關老雪覺性書
