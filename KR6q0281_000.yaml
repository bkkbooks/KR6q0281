front:
  text: 東山和尚道高一世俯視諸方平居面目嚴冷學者不可得而親近或遭喝罵而出此真善知識慈悲慧升嘗獲侍其藥誨臨寂之時以其親刪語録相受皆斟酌古今發揚蘊奧禪衲竟編烏焉成馬念欲鏤正以廣其傳今始符所願亦季子掛劒之義矣於戲真正法眼不類常流大慧老人每以東山為稱今信道者咸生敬仰乃知南陽之鐘不待扣而鳴也時淳熙戊戌季冬朔日住雷峯此丘慧升拜序
